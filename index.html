<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick Paul - Portfolio</title>
    
    <!-- Подключение шрифта Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;800&display=swap" rel="stylesheet">

    <style>
        /* Подключение твоего шрифта Germaine */
        @font-face {
            font-family: 'Germaine';
            src: url('germaine.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* 
         === ИНСТРУКЦИЯ ПО ЦВЕТАМ === 
         */
        :root {
            /* Светлая тема */
            --bg-color: #ffffff;          /* Фон страницы */
            --text-color: #000000;        /* Основной текст */
            --text-muted: #666666;        /* Приглушенный текст (подзаголовки) */
            --header-bg: #ffffff;         /* Фон шапки */
            --border-color: #e5e5e5;      /* Цвет всех рамок и линий */
            --card-bg: #f9f9f9;           /* Фон карточек с видео (где описание) */
            
            /* Кнопки в шапке */
            --btn-bg: transparent;        /* Фон кнопки по умолчанию */
            --btn-text: #000000;          /* Текст кнопки по умолчанию */
            --btn-border: #e5e5e5;        /* Рамка кнопки */
            --btn-active-bg: #000000;     /* Фон кнопки при наведении или когда блок активен */
            --btn-active-text: #ffffff;   /* Текст кнопки при наведении или активности */
        }

        [data-theme="dark"] {
            /* Темная тема (аналогично) */
            --bg-color: #121212;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --header-bg: #121212;
            --border-color: #333333;
            --card-bg: #1a1a1a;
            
            --btn-bg: transparent;
            --btn-text: #ffffff;
            --btn-border: #333333;
            --btn-active-bg: #ffffff;
            --btn-active-text: #000000;
        }

        /* Базовые настройки */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth; /* Плавный скролл при клике на кнопки */
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3 {
            font-family: 'Germaine', serif;
            font-weight: normal;
        }

        /* Общий контейнер для жесткого центрирования 800px */
        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- ШАПКА --- */
        header {
            position: sticky;
            top: 0;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* Используем Grid для идеального центрирования имени и профессии */
        .header-inner {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: 80px;
        }

        /* Логотип (слева) */
        .header-left {
            justify-self: start;
        }
        .logo img {
            height: 30px;
            display: block;
        }

        /* Имя и профессия (по центру) */
        .header-center {
            text-align: center;
            justify-self: center;
        }
        .header-center h1 {
            font-size: 1.5rem;
            line-height: 1.2;
        }
        .header-center p {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Навигация и контролы (справа) */
        .header-right {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Кнопки навигации (About, Works) */
        .nav-btn {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: var(--btn-text);
            background-color: var(--btn-bg);
            text-decoration: none;
            padding: 6px 12px;
            border: 1px solid var(--btn-border);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        /* Наведение и активное состояние (подсветка) */
        .nav-btn:hover, .nav-btn.active {
            background-color: var(--btn-active-bg);
            color: var(--btn-active-text);
            border-color: var(--btn-active-bg);
        }

        /* Анимационный отклик (нажатие) */
        .nav-btn:active {
            transform: scale(0.92);
        }

        /* Иконки интерфейса (язык, тема) */
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform 0.2s ease;
        }
        .icon-btn:hover {
            transform: scale(1.1);
        }
        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Иконки темы */
        .icon-moon { display: block; }
        .icon-sun { display: none; }
        [data-theme="dark"] .icon-moon { display: none; }
        [data-theme="dark"] .icon-sun { display: block; }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        /* Отступ для секций, чтобы шапка не перекрывала их при якорении */
        section {
            scroll-margin-top: 100px; 
            margin-bottom: 60px;
        }

        /* Заглавное видео (Vimeo) без рамки и описания */
        .hero-section {
            margin-top: 40px; /* Отступ от шапки */
        }
        .hero-video {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Заголовки секций */
        .section-title {
            font-size: 2rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        
        .subsection-title {
            font-size: 1.4rem;
            margin: 30px 0 15px 0;
            color: var(--text-color);
        }

        /* Карточки видео (Works) */
        .video-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            width: 100%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-description {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
        }
        .video-description h4 {
            font-family: 'Manrope', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Текст About */
        .about-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-color);
        }

        /* --- ПОДВАЛ (Footer) --- */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 30px 0;
            margin-top: 60px;
            text-align: center;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .social-links a {
            color: var(--text-color);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .social-links a:hover {
            transform: translateY(-3px);
            opacity: 0.7;
        }
        .social-links svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header>
        <div class="container header-inner">
            <div class="header-left">
                <!-- Вставь свой логотип сюда -->
                <a href="#" class="logo"><img src="logo-placeholder.png" alt="Logo" id="siteLogo"></a>
            </div>

            <div class="header-center">
                <h1>Nick Paul</h1>
                <p data-ru="Технический саунд-дизайнер" data-en="Technical Sound Designer">Technical Sound Designer</p>
            </div>

            <div class="header-right">
                <!-- Кнопки навигации -->
                <a href="#about" class="nav-btn" data-ru="Обо мне" data-en="About">About</a>
                <a href="#works" class="nav-btn" data-ru="Работы" data-en="Works">Works</a>
                
                <!-- Кнопка смены языка -->
                <button class="icon-btn" id="langToggle">EN</button>
                
                <!-- Кнопка темы -->
                <button class="icon-btn" id="themeToggle" aria-label="Toggle theme">
                    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <!-- Заглавное видео Vimeo (Без рамки) -->
        <section class="hero-section" id="hero">
            <div class="video-container hero-video">
                <iframe src="https://player.vimeo.com/video/76979871?h=8272103f6e" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
            </div>
        </section>

        <!-- Блок About -->
        <section id="about">
            <h2 class="section-title" data-ru="Обо мне" data-en="About Me">About Me</h2>
            <p class="about-text" data-ru="Здесь ты можешь написать текст о себе на русском языке." data-en="Here you can write your professional bio and detail your experience in sound design.">
                Here you can write your professional bio and detail your experience in sound design.
            </p>
        </section>

        <!-- Блок Works -->
        <section id="works">
            <h2 class="section-title" data-ru="Мои работы" data-en="Selected Works">Selected Works</h2>

            <!-- Первое видео: Technical Breakdown -->
            <h3 class="subsection-title" data-ru="Технический разбор" data-en="Technical Breakdown">Technical Breakdown</h3>
            <div class="video-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="video-description">
                    <h4 data-ru="Название проекта" data-en="Project Title Here">Project Title Here</h4>
                </div>
            </div>

            <!-- Второе видео: Cinematic Redesigns -->
            <h3 class="subsection-title" data-ru="Кинематографичный редизайн" data-en="Cinematic Redesigns">Cinematic Redesigns</h3>
            <div class="video-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="video-description">
                    <h4 data-ru="Название проекта" data-en="Project Title Here">Project Title Here</h4>
                </div>
            </div>
        </section>

    </main>

    <!-- Подвал (Социальные сети) -->
    <footer>
        <div class="container social-links">
            <!-- LinkedIn -->
            <a href="ТВОЯ_ССЫЛКА_LINKEDIN" target="_blank" aria-label="LinkedIn">
                <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
            <!-- Gmail -->
            <a href="mailto:ТВОЯ_ПОЧТА@gmail.com" aria-label="Email">
                <svg viewBox="0 0 24 24"><path d="M0 3v18h24v-18h-24zm6.623 7.929l-4.623 5.712v-9.458l4.623 3.746zm-4.141-5.929h19.035l-9.517 7.713-9.518-7.713zm5.694 7.188l3.824 3.099 3.83-3.104 5.612 6.817h-18.866l5.6-6.812zm9.201-1.476l4.623-3.747v9.476l-4.623-5.729z"/></svg>
            </a>
            <!-- Telegram -->
            <a href="ТВОЯ_ССЫЛКА_TELEGRAM" target="_blank" aria-label="Telegram">
                <svg viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.458c.538-.196 1.006.128.832.941z"/></svg>
            </a>
        </div>
    </footer>

    <!-- Скрипты -->
    <script>
        // --- 1. ЛОГИКА ТЕМНОЙ ТЕМЫ ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.setAttribute('data-theme', 'dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // --- 2. ЛОГИКА СМЕНЫ ЯЗЫКОВ ---
        const langToggle = document.getElementById('langToggle');
        // Находим все элементы, у которых есть атрибуты data-ru и data-en
        const translatableElements = document.querySelectorAll('[data-ru], [data-en]');
        let currentLang = localStorage.getItem('lang') || 'en'; // Язык по умолчанию

        function setLanguage(lang) {
            translatableElements.forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            langToggle.textContent = lang === 'en' ? 'RU' : 'EN';
            localStorage.setItem('lang', lang);
        }

        // Устанавливаем язык при загрузке
        setLanguage(currentLang);

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            setLanguage(currentLang);
        });

        // --- 3. ПОДСВЕТКА КНОПОК ПРИ СКРОЛЛЕ ---
        // Используем IntersectionObserver, чтобы следить, какой блок сейчас на экране
        const sections = document.querySelectorAll('section[id]');
        const navLinks = document.querySelectorAll('.nav-btn');

        const observerOptions = {
            root: null,
            rootMargin: '-50% 0px -50% 0px', // Блок считается активным, если он занимает центр экрана
            threshold: 0
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.getAttribute('id');
                    // Убираем класс active у всех кнопок
                    navLinks.forEach(link => link.classList.remove('active'));
                    // Добавляем класс active кнопке, которая ведет на текущий блок
                    const activeLink = document.querySelector(`.nav-btn[href="#${id}"]`);
                    if (activeLink) activeLink.classList.add('active');
                }
            });
        }, observerOptions);

        sections.forEach(section => observer.observe(section));
    </script>

</body>
</html>
