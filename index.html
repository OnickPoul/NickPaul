<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick Paul - Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;800&display=swap" rel="stylesheet">

    <style>
        /* * Подключение твоего шрифта Germaine 
         * Убедись, что файл шрифта лежит в папке с сайтом!
         */
        @font-face {
            font-family: 'Germaine';
            src: url('germaine.ttf') format('truetype'); /* Замени на точное имя файла, если оно другое (.otf, .woff) */
            font-weight: normal;
            font-style: normal;
        }

        /* Строго черно-белая палитра */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --header-bg: #ffffff;
            --border-color: #e5e5e5;
            --card-bg: #f9f9f9;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --btn-hover: #333333;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --header-bg: #121212;
            --border-color: #333333;
            --card-bg: #1a1a1a;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn-hover: #cccccc;
        }

        /* Сброс базовых отступов для идеального центрирования */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-y: scroll; /* Предотвращает скачки при появлении скроллбара */
        }

        h1, h2, h3 {
            font-family: 'Germaine', serif;
            font-weight: normal;
        }

        /* ОБЩИЙ КОНТЕЙНЕР: решает проблему выравнивания и центрирования */
        .container {
            max-width: 800px; /* Жестко заданная максимальная ширина */
            width: 100%;
            margin: 0 auto;   /* Идеальное центрирование */
            padding: 0 20px;  /* Отступы по бокам для мобильных устройств */
        }

        /* Шапка */
        header {
            position: sticky;
            top: 0;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        /* Логотип */
        .logo img {
            height: 30px; /* Подгони под размер своего логотипа */
            width: auto;
            display: block;
        }

        /* Правая часть шапки с контролами */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px; /* Расстояние между кнопкой, языком и темой */
        }

        /* Кнопка About в шапке */
        .btn-about {
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-color);
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .btn-about:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        /* Переключатель языка */
        .lang-toggle {
            background: none;
            border: none;
            color: var(--text-color);
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
        }

        /* Переключатель темы (Иконка) */
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover svg {
            transform: scale(1.1);
        }

        /* Логика показа SVG (Солнце/Луна) */
        .icon-moon { display: block; }
        .icon-sun { display: none; }
        [data-theme="dark"] .icon-moon { display: none; }
        [data-theme="dark"] .icon-sun { display: block; }

        /* Блок с именем (строго по центру) */
        .hero {
            text-align: center;
            margin: 60px 0 40px 0;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .hero p {
            font-size: 1rem;
            color: var(--text-color);
            opacity: 0.8; /* Делает текст чуть менее контрастным, стильно для подзаголовков */
        }

        /* Карточки видео */
        .video-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 40px;
            overflow: hidden; /* Обрезает углы видео под радиус рамки */
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            width: 100%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Описание под видео */
        .video-description {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color); /* Рамка только снизу между видео и текстом */
        }

        .video-description h3 {
            font-family: 'Manrope', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="logo-placeholder.png" alt="Nick Paul Logo" id="siteLogo">
            </a>

            <div class="header-controls">
                <a href="about.html" class="btn-about">About</a>
                
                <button class="lang-toggle" id="langToggle">EN</button>
                
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="icon-moon" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="icon-sun" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        
        <div class="hero">
            <h1>Nick Paul</h1>
            <p>Technical Sound Designer</p>
        </div>

        <div class="video-card">
            <div class="video-container">
                <iframe src="https://player.vimeo.com/video/76979871?h=8272103f6e" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-description">
                <h3>Vimeo Project Title</h3>
            </div>
        </div>

        <div class="video-card">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-description">
                <h3>YouTube Project Title</h3>
            </div>
        </div>

    </main>

    <script>
        // --- Логика темной темы ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const body = document.body;
        // Заглушка для логотипа: если нужно менять лого на белое/черное в зависимости от темы
        const logoImg = document.getElementById('siteLogo');

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.setAttribute('data-theme', 'dark');
            // Если есть белая версия логотипа для темной темы, раскомментируй строку ниже:
            // logoImg.src = 'logo-white.png'; 
        }

        themeToggleBtn.addEventListener('click', () => {
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                // logoImg.src = 'logo-black.png'; // черное лого для светлой темы
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                // logoImg.src = 'logo-white.png'; // белое лого для темной темы
            }
        });

        // --- Логика переключения языка (визуальная заглушка) ---
        const langToggle = document.getElementById('langToggle');
        langToggle.addEventListener('click', () => {
            if (langToggle.textContent === 'EN') {
                langToggle.textContent = 'RU';
                // В будущем здесь будет логика подмены текста
            } else {
                langToggle.textContent = 'EN';
            }
        });
    </script>

</body>
</html>
