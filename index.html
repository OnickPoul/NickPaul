<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick Paul - Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;800&display=swap" rel="stylesheet">

    <style>
        /* Подключение твоего шрифта Germaine */
        @font-face {
            font-family: 'Germaine';
            src: url('Germaine Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --text-muted: #666666;
            --header-bg: #ffffff;
            --border-color: #e5e5e5;
            --card-bg: #f9f9f9;
            --btn-bg: transparent;
            --btn-text: #000000;
            --btn-border: #e5e5e5;
            --btn-active-bg: #000000;
            --btn-active-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --header-bg: #121212;
            --border-color: #333333;
            --card-bg: #1a1a1a;
            --btn-bg: transparent;
            --btn-text: #ffffff;
            --btn-border: #333333;
            --btn-active-bg: #ffffff;
            --btn-active-text: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            line-height: 1.5; /* Увеличен межстрочный интервал по всему сайту */
        }

        h1, h2, h4, {
            font-family: 'Germaine', serif;
            font-weight: normal;
            line-height: 1.3;
        }

        h3 {
            font-family: 'Manrope', sans-serif; /* Здесь можно поменять на любой другой шрифт */
            font-weight: 600;
            line-height: 1.4;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Базовое состояние (для светлой темы) */
    .logo img {
         transition: filter 0.3s ease; /* Плавный переход при смене темы */
}

/* Состояние в темной теме */
    [data-theme="dark"] .logo img {
        filter: invert(1); /* Инвертирует цвета: черный станет белым, белый — черным */
}

  /* Улучшенная шапка */
    header {
        position: sticky;
        top: 0;
        background-color: var(--header-bg);
        border-bottom: 1px solid var(--border-color);
        z-index: 1000;
        transition: background-color 0.3s ease, border-color 0.3s ease;
    }
     .header-inner {
        display: grid;
        grid-template-columns: 1fr auto 1fr; /* Левая, центральная, правая часть */
        align-items: center;
        height: 70px; /* Немного уменьшили высоту, чтобы выглядело компактнее */
    }

        .header-left {
            justify-self: start;
        }
        
        .logo img {
            height: 55px; /* Чуть увеличен логотип */
            display: block;
        }

      .header-center {
        text-align: center;
        justify-self: center;
        white-space: nowrap; /* Запрещает тексту переноситься на новую строку */
    }
        
        .header-center h1 {
            font-size: 1.6rem;
            margin-bottom: 1.5px;
        }
        
        .header-center p {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .header-right {
            justify-self: end;
            display: flex;
            align-items: center;
            gap: 14px; /* Увеличено расстояние между кнопками */
        }

    /* Компактные кнопки навигации */
    .nav-btn {
        font-family: 'Manrope', sans-serif;
        font-weight: 600;
        font-size: 12px; /* Чуть уменьшили шрифт */
        color: var(--btn-text);
        background-color: var(--btn-bg);
        text-decoration: none;
        padding: 5px 10px; /* Уменьшили отступы внутри кнопок */
        border: 1px solid var(--btn-border);
        border-radius: 4px;
        transition: all 0.2s ease;
    }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--btn-active-bg);
            color: var(--btn-active-text);
            border-color: var(--btn-active-bg);
        }

        .nav-btn:active {
            transform: scale(0.92);
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform 0.2s ease;
        }
        
        .icon-btn:hover {
            transform: scale(1.1);
        }
        
        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .icon-moon { display: block; }
        .icon-sun { display: none; }
        [data-theme="dark"] .icon-moon { display: none; }
        [data-theme="dark"] .icon-sun { display: block; }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        section {
            scroll-margin-top: 120px; /* Отступ при якорении, чтобы шапка не перекрывала контент */
            margin-bottom: 80px; /* Увеличено расстояние между блоками */
        }

        .hero-section {
            margin-top: 50px;
        }
        
        .hero-video {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 2.2rem;
            margin-bottom: 30px; /* Больше воздуха под заголовком секции */
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        
        .subsection-title {
            font-size: 1.5rem;
            margin: 50px 0 20px 0; /* Больше воздуха вокруг подзаголовков */
            color: var(--text-color);
        }

        .video-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            width: 100%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-description {
            padding: 20px 25px; /* Увеличены отступы внутри описания видео */
            border-top: 1px solid var(--border-color);
        }
        
        .video-description h4 {
            font-family: 'Manrope', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .about-text {
            font-size: 1.15rem;
            line-height: 1.8; /* Очень комфортный интервал для чтения */
            color: var(--text-color);
        }

        /* --- ПОДВАЛ (Footer) --- */
        footer {
        border-top: 1px solid var(--border-color);
        margin-top: 60px;
        padding: 20px 0; /* Вместо фиксированной высоты используем отступы */
        display: flex;
        align-items: center;
        justify-content: center;
    }
        
           .social-links {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        /* Исправление цвета иконок: теперь применяем цвет к ссылкам, а не к контейнеру */
        .social-links a {
            color: var(--text-color) !important; 
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        .social-links a:hover {
            transform: translateY(-3px);
            opacity: 0.7;
        }
        
        .social-links svg {
            width: 28px;
            height: 28px;
            fill: currentColor; /* Иконки будут брать цвет текста (черный/белый) */
        }
    </style>
</head>
<body>

    <script>
        // 1. Темная тема
        const themeToggleBtn = document.getElementById('themeToggle');
        const body = document.body;

        if (localStorage.getItem('theme') === 'dark') {
            body.setAttribute('data-theme', 'dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        // 2. Смена языка (Исправлена логика отображения кнопки)
        const langToggle = document.getElementById('langToggle');
        const translatableElements = document.querySelectorAll('[data-ru], [data-en]');
        let currentLang = localStorage.getItem('lang') || 'en';

        function setLanguage(lang) {
            translatableElements.forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            // Теперь кнопка всегда показывает ТОТ ЯЗЫК, который сейчас включен на сайте
            langToggle.textContent = lang.toUpperCase();
            localStorage.setItem('lang', lang);
        }

        setLanguage(currentLang);

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ru' : 'en';
            setLanguage(currentLang);
        });

        // 3. Подсветка кнопок
        const sections = document.querySelectorAll('section[id]');
        const navLinks = document.querySelectorAll('.nav-btn');

        const observerOptions = {
            root: null,
            rootMargin: '-40% 0px -60% 0px',
            threshold: 0
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.getAttribute('id');
                    navLinks.forEach(link => link.classList.remove('active'));
                    const activeLink = document.querySelector(`.nav-btn[href="#${id}"]`);
                    if (activeLink) activeLink.classList.add('active');
                }
            });
        }, observerOptions);

        sections.forEach(section => observer.observe(section));
    </script>
